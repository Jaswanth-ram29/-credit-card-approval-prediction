<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Credit Card Approval Prediction{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="{{ url_for('home') }}" class="brand">Credit Card Approval Prediction</a>
      <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('predict') }}">Apply</a>
        {% if current_user %}
        <a href="{{ url_for('history') }}">History</a>
        <a href="{{ url_for('logout') }}">Logout ({{ current_user.Name.split(' ')[0] }})</a>
        {% else %}
        <a href="{{ url_for('login') }}">Sign in</a>
        <a href="{{ url_for('register') }}">Sign up</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    Demo project trained on synthetic data — not a real financial institution.
  </footer>
</body>
</html>
