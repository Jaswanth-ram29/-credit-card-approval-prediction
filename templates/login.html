{% extends "base.html" %}
{% block title %}Sign In — Credit Card Approval Prediction{% endblock %}
{% block content %}

<h1>Sign in</h1>

{% if error %}
<div class="alert">{{ error }}</div>
{% endif %}

<form method="POST" class="card form" style="max-width: 420px;">
  <label>
    Email
    <input type="email" name="email" required>
  </label>
  <label>
    Password
    <input type="password" name="password" required>
  </label>
  <button type="submit" class="btn">Sign in</button>
</form>

<p style="color: var(--muted); margin-top: 14px;">
  No account yet? <a href="{{ url_for('register') }}">Create one</a>
</p>

{% endblock %}
